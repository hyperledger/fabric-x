---
# The gRPC endpoint where the load generator exposes its full API for
# programmatic control of load generation.
server:
  endpoint: :8001
  tls: &tlsConfig
    mode: mtls
    cert-path: /artifacts/peerOrganizations/peer-org-0/peers/loadgen.peer-org-0/tls/server.crt
    key-path: /artifacts/peerOrganizations/peer-org-0/peers/loadgen.peer-org-0/tls/server.key
    ca-cert-paths:
      - /artifacts/peerOrganizations/peer-org-0/msp/tlscacerts/tlsca.peer-org-0-cert.pem

# Monitoring endpoint configuration (Prometheus metrics at /metrics and pprof profiling at /debug/pprof/).
monitoring:
  endpoint: :2118
  tls: *tlsConfig

# Orderer client configuration for submitting transactions
orderer-client:
  # Direct orderer connection configuration
  orderer:
    # BFT fault tolerance for Arma ordering service
    fault-tolerance-level: BFT
    # Path to the config block generated by configtxgen
    latest-known-config-block-path: /artifacts/config-block.pb.bin
    # Loadgen uses these TLS credentials when connecting to the orderers as a client
    tls:
      mode: mtls
      cert-path: /artifacts/peerOrganizations/peer-org-0/peers/loadgen.peer-org-0/tls/server.crt
      key-path: /artifacts/peerOrganizations/peer-org-0/peers/loadgen.peer-org-0/tls/server.key
      common-ca-cert-paths:
        - /artifacts/ordererOrganizations/orderer-org-1/msp/tlscacerts/tlsca.orderer-org-1-cert.pem
        - /artifacts/ordererOrganizations/orderer-org-2/msp/tlscacerts/tlsca.orderer-org-2-cert.pem
        - /artifacts/ordererOrganizations/orderer-org-3/msp/tlscacerts/tlsca.orderer-org-3-cert.pem
        - /artifacts/ordererOrganizations/orderer-org-4/msp/tlscacerts/tlsca.orderer-org-4-cert.pem
    # Identity for signing transactions - using PeerOrg0 client
    identity:
      msp-id: peer-org-0
      msp-dir: /artifacts/peerOrganizations/peer-org-0/users/client@peer-org-0/msp
      bccsp:
        Default: SW
        SW:
          Security: 256
          Hash: SHA2
  broadcast-parallelism: 4
  # Receive blocks from committer sidecar (validates full E2E pipeline)
  sidecar-client:
    endpoint: committer:4001
    tls:
      mode: mtls
      cert-path: /artifacts/peerOrganizations/peer-org-0/peers/loadgen.peer-org-0/tls/server.crt
      key-path: /artifacts/peerOrganizations/peer-org-0/peers/loadgen.peer-org-0/tls/server.key
      ca-cert-paths:
        - /artifacts/peerOrganizations/peer-org-0/msp/tlscacerts/tlsca.peer-org-0-cert.pem

# Load profile configuration
load-profile:
  seed: 12345
  workers: 4
  key:
    size: 32
  block:
    max-size: 100
    min-size: 1
    preferred-rate: 2s
  transaction:
    read-write-count:
      const: 2
  policy:
    channel-id: mychannel
    # Orderer endpoints: separate broadcast (router) and deliver (assembler) per party.
    # Party IDs are 0-indexed in the config block (orderer org index), ports match shared_config.yaml.
    orderer-endpoints:
      - id=0,broadcast,arma:6022
      - id=0,deliver,arma:6023
      - id=1,broadcast,arma:6122
      - id=1,deliver,arma:6123
      - id=2,broadcast,arma:6222
      - id=2,deliver,arma:6223
      - id=3,broadcast,arma:6322
      - id=3,deliver,arma:6323
    # Two peer organizations for lifecycle endorsement policy generation
    peer-organization-count: 2
    # Path to the crypto artifacts generated by cryptogen
    artifacts-path: /artifacts
    # MSP-based endorsement for namespace 0 (default namespace)
    namespace-policies:
      0:
        scheme: MSP
        msp-identities:
          - msp-id: peer-org-0
            msp-dir: /artifacts/peerOrganizations/peer-org-0/users/client@peer-org-0/msp
          - msp-id: peer-org-1
            msp-dir: /artifacts/peerOrganizations/peer-org-1/users/client@peer-org-1/msp

# Stopping condition: run until 10000 transactions are committed
limit:
  blocks: 0
  transactions: 10000

stream:
  rate-limit: 150
  buffers-size: 100
  gen-batch: 10

generate:
  config: false
  namespaces: false
  load: true

logging:
  logSpec: info:grpc=error
  format: >-
    %{color}%{time:2006-01-02 15:04:05.000 MST} [%{module}] %{shortfunc}
    -> %{level:.4s}%{color:reset} %{message}
