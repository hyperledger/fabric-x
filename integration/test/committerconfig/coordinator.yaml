---
server:
  endpoint: :9001
  tls: &tlsConfig
    mode: mtls
    cert-path: /root/artifacts/peerOrganizations/peer-org-0/peers/coordinator.peer-org-0/tls/server.crt
    key-path: /root/artifacts/peerOrganizations/peer-org-0/peers/coordinator.peer-org-0/tls/server.key
    ca-cert-paths:
      - /root/artifacts/peerOrganizations/peer-org-0/msp/tlscacerts/tlsca.peer-org-0-cert.pem
monitoring:
  endpoint: :2119
  tls: *tlsConfig
  rate-limit:
    requests-per-second: 0
    burst: 0

verifier:
  endpoints:
    - localhost:5001
  tls: *tlsConfig
validator-committer:
  endpoints:
    - localhost:6001
  tls: *tlsConfig

dependency-graph:
  num-of-local-dep-constructors: 1
  waiting-txs-limit: 100_000

per-channel-buffer-size-per-goroutine: 10

logging:
  logSpec: info:grpc=error
  format: >-
    %{color}%{time:2006-01-02 15:04:05.000 MST} [%{module}] %{shortfunc}
    -> %{level:.4s}%{color:reset} %{message}
