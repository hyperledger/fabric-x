---
server:
  endpoint: :6001
  tls: &tlsConfig
    mode: mtls
    cert-path: /root/artifacts/peerOrganizations/peer-org-0/peers/vc.peer-org-0/tls/server.crt
    key-path: /root/artifacts/peerOrganizations/peer-org-0/peers/vc.peer-org-0/tls/server.key
    ca-cert-paths:
      - /root/artifacts/peerOrganizations/peer-org-0/msp/tlscacerts/tlsca.peer-org-0-cert.pem
monitoring:
  endpoint: :2116
  tls: *tlsConfig
  rate-limit:
    requests-per-second: 0
    burst: 0
database:
  endpoints:
    - localhost:5433
  username: "postgres"
  password: "postgres"
  database: "postgres"
  tls:
    mode: none
  max-connections: 10
  min-connections: 5
  load-balance: false
  table-pre-split-tablets: 0
  retry:
    initial-interval: 500ms
    randomization-factor: 0.5
    multiplier: 1.5
    max-interval: 60s
    max-elapsed-time: 15m

resource-limits:
  max-workers-for-preparer: 1
  max-workers-for-validator: 1
  max-workers-for-committer: 20
  min-transaction-batch-size: 1
  timeout-for-min-transaction-batch-size: 2s

logging:
  logSpec: info:grpc=error
  format: >-
    %{color}%{time:2006-01-02 15:04:05.000 MST} [%{module}] %{shortfunc}
    -> %{level:.4s}%{color:reset} %{message}
