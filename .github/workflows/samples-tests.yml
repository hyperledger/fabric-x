name: Sample Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Sample Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install make
        run: |
          sudo apt-get update
          sudo apt-get install -y make

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify Go installation
        run: |
          go version
          echo "GOPATH: $GOPATH"
          echo "GOROOT: $GOROOT"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-core
          ansible --version

      - name: Run samples tests on Fabric v3
        run: |
          cd samples/tokens
          export PLATFORM=fabric3
          make install-prerequisites setup start test teardown

      - name: Run samples tests on Fabric-X
        run: |
          cd samples/tokens
          export PLATFORM=fabricx
          make install-prerequisites setup start test teardown
